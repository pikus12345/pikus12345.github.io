name: Deploy to GitHub Pages

# Запускаем деплой при пуше в main/master, а также вручную из вкладки Actions
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Разрешения, необходимые для публикации на GitHub Pages через официальный action
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Настройка GitHub Pages
        uses: actions/configure-pages@v4

      - name: Загрузка артефакта (весь корень репозитория)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './'

      - name: Деплой на GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
