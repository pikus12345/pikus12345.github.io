<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Инквизитор — WebGL билд</title>
  <style>
    /* Плейсхолдер-стили для страницы WebGL-билда.
       После сборки Unity WebGL этот файл будет заменён сгенерированным index.html
       из папки Build/ и TemplateData/. */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .placeholder {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    .placeholder .icon { font-size: 3rem; margin-bottom: 1rem; }
    .placeholder h1 { color: #fff; font-size: 1.5rem; margin-bottom: 0.75rem; }
    .placeholder p { color: #a0a0b0; font-size: 0.95rem; line-height: 1.6; }
    .placeholder code {
      display: block;
      margin-top: 1rem;
      background: #14141e;
      border: 1px solid rgba(108, 99, 255, 0.25);
      border-radius: 8px;
      padding: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      color: #8b84ff;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="placeholder">
    <div class="icon">🎮</div>
    <h1>WebGL-билд «Инквизитор» ещё не загружен</h1>
    <p>
      Замените содержимое этой папки экспортированным Unity WebGL-билдом
      (папки <strong>Build/</strong> и <strong>TemplateData/</strong>, файл <strong>index.html</strong>),
      чтобы игра отображалась прямо на сайте.
    </p>
    <code>File → Build Settings → WebGL → Build → projects/inquisitor-webgl/</code>
  </div>
</body>
</html>
